<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M&A Kitchen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cr:#FDFAF6;--cr2:#F2EBE0;--or:#C97A45;--orl:#FAF0E6;
  --bl:#5B8DD9;--bll:#EEF4FF;--gn:#3DA070;--gnl:#E6F6EE;
  --yw:#C49830;--ywl:#FDF6E0;--rd:#C85A5A;--rdl:#FCEAEA;
  --pu:#8B6EC4;--pul:#F2EEFF;
  --tx:#1C1710;--tx2:#6B5E4E;--tx3:#A89B8E;
  --bd:#E8DDD0;--wh:#FFFFFF;
  --r:14px;--rsm:8px;--rlg:20px;
  --sh:0 2px 10px rgba(28,23,16,0.08);--shl:0 8px 28px rgba(28,23,16,0.13);
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--ff);background:var(--cr);color:var(--tx);line-height:1.5;-webkit-text-size-adjust:100%}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:230px;background:var(--wh);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{padding:22px 18px 14px;border-bottom:1px solid var(--bd)}
.logo{font-size:17px;font-weight:800;color:var(--or);letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.nav-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);padding:14px 18px 5px}
.nav-it{display:flex;align-items:center;gap:9px;padding:9px 14px 9px 16px;margin:1px 8px;border-radius:var(--rsm);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--tx2);transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:var(--ff)}
.nav-it:hover{background:var(--cr2)}
.nav-it.active{background:var(--or);color:var(--wh);font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page{flex:1;overflow-y:auto;padding-bottom:16px}

/* HERO */
.hero{padding:24px 28px 0;background:var(--wh);border-bottom:1px solid var(--bd)}
.hero-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--or);margin-bottom:6px}
.hero-title{font-size:26px;font-weight:800;color:var(--tx);line-height:1.2;letter-spacing:-.02em}
.hero-title em{color:var(--or);font-style:italic}
.hero-sub{font-size:13.5px;color:var(--tx2);margin-top:4px;padding-bottom:20px}
.body{padding:20px 28px}

/* SEARCH */
.search-wrap{position:relative;max-width:520px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-inp{width:100%;padding:12px 40px 12px 42px;border:2px solid var(--bd);border-radius:100px;font-size:16px;font-family:var(--ff);background:var(--wh);color:var(--tx);outline:none;transition:border .15s}
.search-inp:focus{border-color:var(--or)}
.search-clear{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--tx3);line-height:1;padding:4px;font-family:var(--ff)}
.search-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);box-shadow:var(--shl);z-index:100;overflow:hidden;max-height:360px;overflow-y:auto}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.drop-item:last-child{border-bottom:none}
.drop-item:hover,.drop-item:active{background:var(--cr2)}
.drop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drop-name{font-weight:700;font-size:13.5px;color:var(--tx)}
.drop-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.drop-empty{padding:16px;text-align:center;color:var(--tx3);font-size:13px}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-fast{background:var(--gnl);color:var(--gn)}
.tag-med{background:var(--ywl);color:var(--yw)}
.tag-slow{background:var(--rdl);color:var(--rd)}
.tag-easy{background:var(--gnl);color:var(--gn)}
.tag-medium{background:var(--ywl);color:var(--yw)}
.tag-hard{background:var(--rdl);color:var(--rd)}
.tag-cuisine{background:var(--bll);color:var(--bl)}
.tag-protein{background:var(--orl);color:var(--or)}

/* GROUPED BROWSE */
.meal-block{border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;background:var(--wh)}
.meal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--cr2);cursor:pointer;user-select:none;border:none;width:100%;text-align:left;font-family:var(--ff)}
.meal-hdr:hover{background:var(--bd)}
.meal-hdr-left{display:flex;align-items:center;gap:8px}
.meal-name{font-weight:800;font-size:14px;color:var(--tx)}
.meal-count{font-size:11px;font-weight:600;color:var(--tx3);background:var(--wh);border:1px solid var(--bd);border-radius:100px;padding:1px 7px}
.meal-arrow{color:var(--tx3);font-size:13px;transition:transform .2s}
.meal-arrow.open{transform:rotate(180deg)}
.cuisine-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cuisine-name{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.cuisine-count{font-size:10.5px;color:var(--tx3)}
.rr-protein{font-size:11px;color:var(--tx3);min-width:70px;text-align:right;flex-shrink:0}

/* ACTION BUTTONS ROW */
.action-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:var(--ff);touch-action:manipulation;white-space:nowrap}
.btn-primary{background:var(--or);color:var(--wh)}
.btn-primary:hover,.btn-primary:active{background:#b56b38}
.btn-secondary{background:var(--cr2);color:var(--tx);border:1px solid var(--bd)}
.btn-secondary:hover,.btn-secondary:active{background:var(--bd)}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover,.btn-ghost:active{background:var(--cr2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:7px 13px;font-size:12px}

/* FILTER PILLS */
.pill-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;transition:all .15s;touch-action:manipulation;font-family:var(--ff)}
.pill:active{opacity:.7}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:16px}
.card{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover,.card:active{border-color:var(--or);transform:translateY(-2px);box-shadow:var(--sh)}
.card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.card-name{font-weight:700;font-size:14.5px;color:var(--tx);margin-bottom:8px;line-height:1.3}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.card-excerpt{font-size:12px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* DECIDE PAGE */
.form-box{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--rlg);padding:22px;margin-bottom:20px}
.form-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px}
.chip-grp{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.chip{padding:7px 13px;border-radius:100px;font-size:12.5px;font-weight:500;border:1.5px solid var(--bd);cursor:pointer;background:var(--wh);color:var(--tx2);transition:all .15s;touch-action:manipulation;font-family:var(--ff)}
.chip.active{background:var(--or);color:var(--wh);border-color:var(--or)}
.result-card{background:var(--wh);border:2px solid var(--bd);border-radius:var(--rlg);padding:18px;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative}
.result-card:hover,.result-card:active{border-color:var(--or);transform:translateY(-2px);box-shadow:var(--sh)}
.result-card.top{border-color:var(--or)}
.result-rank{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.rank1{background:var(--or);color:var(--wh)}
.rank2{background:var(--bll);color:var(--bl)}
.rank3{background:var(--cr2);color:var(--tx2)}
.match-pct{font-size:24px;font-weight:800;color:var(--or);margin-bottom:2px}
.match-name{font-weight:700;font-size:16px;color:var(--tx);margin-bottom:6px}
.match-reason{font-size:12px;color:var(--tx2);font-style:italic;margin-bottom:8px}

/* INGREDIENT FINDER */
.ing-wrap{display:flex;gap:8px;margin-bottom:12px}
.ing-inp{flex:1;padding:10px 14px;border:1.5px solid var(--bd);border-radius:100px;font-size:16px;font-family:var(--ff);background:var(--wh);color:var(--tx);outline:none;transition:border .15s}
.ing-inp:focus{border-color:var(--or)}
.ing-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.ing-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--orl);border:1.5px solid var(--or);border-radius:100px;font-size:12.5px;font-weight:500;color:var(--or)}
.ing-chip button{background:none;border:none;cursor:pointer;color:var(--or);font-size:15px;line-height:1;padding:0;font-family:var(--ff)}
.match-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.match-card:hover,.match-card:active{border-color:var(--or);background:var(--orl)}
.mc-info{flex:1}
.mc-name{font-weight:700;font-size:14px;color:var(--tx);margin-bottom:4px}
.mc-missing{font-size:11.5px;color:var(--rd);margin-top:4px}
.mc-pct{font-weight:800;font-size:18px;color:var(--or)}

/* PLANNER */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.day-cell{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px;min-height:90px}
.day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:6px}
.day-empty{border:1.5px dashed var(--bd);border-radius:var(--rsm);padding:8px;font-size:11px;color:var(--tx3);text-align:center;min-height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.day-filled{background:var(--orl);border:1.5px solid var(--or);border-radius:var(--rsm);padding:8px;cursor:pointer;transition:opacity .15s}
.day-filled:hover,.day-filled:active{opacity:.8}
.day-recipe-name{font-weight:600;font-size:11.5px;color:var(--tx);line-height:1.3;margin-bottom:3px}
.day-recipe-meta{font-size:10px;color:var(--tx2)}
.day-regen{font-size:10px;color:var(--bl);cursor:pointer;text-align:right;margin-top:3px;background:none;border:none;font-family:var(--ff);padding:0;width:100%}

/* SHOPPING */
.shop-cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:12px 0 8px;border-bottom:2px solid var(--bd);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd);cursor:pointer;touch-action:manipulation}
.shop-check{width:20px;height:20px;border:2px solid var(--bd);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px}
.shop-check.done{background:var(--gn);border-color:var(--gn);color:var(--wh)}
.shop-name{font-size:14px;color:var(--tx);flex:1;text-transform:capitalize;transition:all .15s}
.shop-name.done{text-decoration:line-through;color:var(--tx3)}

/* HISTORY */
.hx-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hx-card:hover,.hx-card:active{border-color:var(--or)}
.hx-name{font-weight:700;font-size:13.5px;color:var(--tx);flex:1}
.hx-meta{font-size:11.5px;color:var(--tx3)}
.hx-badge{background:var(--gnl);color:var(--gn);font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px}

/* DETAIL */
.detail-hero{padding:22px 28px 0;background:var(--wh);border-bottom:1px solid var(--bd)}
.detail-title{font-size:24px;font-weight:800;color:var(--tx);letter-spacing:-.02em;line-height:1.2;margin-bottom:12px}
.detail-meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.meta-pill{background:var(--cr2);border:1px solid var(--bd);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--tx2)}
.detail-body{padding:20px 28px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.detail-sec{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.detail-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:12px}
.step-row{display:flex;gap:10px;margin-bottom:10px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--or);color:var(--wh);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px}
.step-text{font-size:13.5px;color:var(--tx2);line-height:1.6}
.flav-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.flav-name{width:60px;font-size:12px;font-weight:600;color:var(--tx2);text-align:right;flex-shrink:0}
.flav-track{flex:1;height:8px;background:var(--cr2);border-radius:4px;overflow:hidden}
.flav-fill{height:100%;border-radius:4px;transition:width .6s}
.related-card{background:var(--cr2);border:1px solid var(--bd);border-radius:var(--rsm);padding:10px 12px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.related-card:hover,.related-card:active{background:var(--orl);border-color:var(--or)}
.rc-name{font-weight:700;font-size:13px;color:var(--tx);margin-bottom:4px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--tx2);cursor:pointer;background:none;border:none;padding:0;margin-bottom:14px;font-family:var(--ff);touch-action:manipulation}
.back-btn:hover,.back-btn:active{color:var(--or)}

/* OVERVIEW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center}
.stat-num{font-size:36px;font-weight:800;color:var(--or);line-height:1}
.stat-lbl{font-size:11px;color:var(--tx2);margin-top:4px}
.bar-section{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
.bar-lbl-row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.bar-track{height:7px;background:var(--cr2);border-radius:4px;overflow:hidden;margin-bottom:10px}
.bar-fill{height:100%;border-radius:4px;transition:width .6s}

/* COOK MODE */
#cook-overlay{position:fixed;inset:0;background:#1C1710;z-index:300;display:none;flex-direction:column}
#cook-overlay.open{display:flex}
.cook-hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1)}
.cook-recipe-name{font-size:16px;font-weight:700;color:var(--wh);font-style:italic;flex:1;margin-right:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cook-prog{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin:0 16px}
.cook-prog-fill{height:100%;background:var(--or);border-radius:2px;transition:width .4s}
.cook-step-ct{font-size:11px;color:rgba(255,255,255,.5)}
.cook-close{background:rgba(255,255,255,.1);border:none;color:var(--wh);padding:8px 14px;border-radius:100px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ff)}
.cook-body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;overflow-y:auto}
.cook-wrap{max-width:600px;width:100%;text-align:center}
.cook-step-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--or);margin-bottom:12px}
.cook-step-txt{font-size:22px;font-weight:600;color:var(--wh);line-height:1.5;margin-bottom:24px;font-style:italic}
.cook-timer{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);padding:16px 24px;display:inline-flex;align-items:center;gap:12px;margin-bottom:24px;cursor:pointer;transition:all .2s;touch-action:manipulation}
.cook-timer:hover,.cook-timer:active{background:rgba(201,122,69,.2);border-color:var(--or)}
.cook-timer-display{font-size:28px;font-weight:800;color:var(--wh)}
.cook-timer-lbl{font-size:11px;color:rgba(255,255,255,.5)}
.cook-nav{display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap}
.cook-btn{padding:12px 24px;border-radius:100px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;touch-action:manipulation}
.cook-prev{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.cook-next{background:var(--or);color:var(--wh)}
.cook-checklist{background:rgba(255,255,255,.05);border-radius:var(--r);padding:16px;text-align:left;margin-bottom:24px;max-height:50vh;overflow-y:auto}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;touch-action:manipulation}
.ck-item:last-child{border-bottom:none}
.ck-box{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;font-size:11px;color:var(--wh)}
.ck-box.checked{background:var(--or);border-color:var(--or)}
.ck-text{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.5}
.ck-text.checked{text-decoration:line-through;color:rgba(255,255,255,.35)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.7}
.empty-title{font-size:17px;font-weight:700;color:var(--tx2);margin-bottom:6px}

/* BOTTOM NAV */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--wh);border-top:1.5px solid var(--bd);padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(28,23,16,0.08)}
.bn-inner{display:flex;height:58px}
.bn-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:none;border:none;color:var(--tx3);transition:color .15s;font-family:var(--ff);touch-action:manipulation;padding:4px 2px}
.bn-it:active{opacity:.6}
.bn-it.active{color:var(--or)}
.bn-icon{font-size:20px;line-height:1}
.bn-lbl{font-size:9.5px;font-weight:700;letter-spacing:.03em}

/* RESPONSIVE */
@media(max-width:900px){
  .detail-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:700px){
  #sidebar{display:none}
  #main{padding-bottom:58px}
  #bottom-nav{display:block}
  .hero{padding:16px 16px 0}
  .body{padding:14px 16px}
  .detail-hero{padding:16px 16px 0}
  .detail-body{padding:14px 16px}
  .hero-title{font-size:22px}
  .detail-title{font-size:20px}
  .cook-step-txt{font-size:19px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(2,1fr)}
  .card-grid{grid-template-columns:1fr}
  .rr-protein{display:none}
}
@media(max-width:400px){
  .week-grid{grid-template-columns:repeat(2,1fr)}
  .hero-title{font-size:20px}
}

/* 2-COLUMN BROWSE */
.browse-2col{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bd)}
.cuisine-block{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.cuisine-block:nth-child(2n){border-right:none}
.cuisine-block:nth-last-child(-n+2){border-bottom:none}
.cuisine-hdr{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid var(--bd)}
.recipe-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;background:var(--wh)}
.recipe-row:last-child{border-bottom:none}
.recipe-row:hover,.recipe-row:active{background:var(--cr2)}
.rr-name{flex:1;font-weight:600;font-size:13px;color:var(--tx);min-width:0;line-height:1.3}
.rr-tags{display:flex;gap:3px;flex-shrink:0}
@media(max-width:700px){
  .browse-2col{grid-template-columns:1fr}
  .cuisine-block{border-right:none}
  .cuisine-block:nth-last-child(-n+2){border-bottom:1px solid var(--bd)}
  .cuisine-block:last-child{border-bottom:none}
  .rr-name{font-size:13px}
}
/* BUCKET LIST */
.bl-filter-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
.bl-filter-row::-webkit-scrollbar{display:none}
.bl-progress{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.bl-prog-bar{flex:1;height:10px;background:var(--cr2);border-radius:5px;overflow:hidden}
.bl-prog-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--gn));border-radius:5px;transition:width .5s ease}
.bl-prog-text{font-weight:800;font-size:14px;color:var(--tx);white-space:nowrap}
.bl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.bl-card{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--rlg);overflow:hidden;transition:all .2s;cursor:pointer;position:relative}
.bl-card:hover{transform:translateY(-3px);box-shadow:var(--shl);border-color:var(--or)}
.bl-card.done{border-color:var(--gn)}
.bl-photo{width:100%;height:160px;object-fit:cover;display:block;background:var(--cr2)}
.bl-photo-wrap{position:relative;overflow:hidden}
.bl-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;backdrop-filter:blur(4px)}
.bl-done-badge{background:rgba(61,160,112,0.92);color:#fff}
.bl-try-badge{background:rgba(201,122,69,0.92);color:#fff}
.bl-card-body{padding:14px 16px 16px}
.bl-name{font-weight:800;font-size:15px;color:var(--tx);margin-bottom:6px;line-height:1.3}
.bl-why{font-size:12.5px;color:var(--tx2);line-height:1.5;margin-bottom:10px}
.bl-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.bl-check-btn{width:100%;padding:9px;border-radius:var(--rsm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--ff);touch-action:manipulation}
.bl-check-btn.untried{background:var(--orl);color:var(--or)}
.bl-check-btn.untried:hover{background:var(--or);color:#fff}
.bl-check-btn.tried{background:var(--gnl);color:var(--gn)}
.bl-num{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;background:rgba(28,23,16,0.6);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
@media(max-width:700px){
  .bl-grid{grid-template-columns:1fr}
  .bl-photo{height:200px}
  .bl-card-body{padding:12px 14px 14px}
  .bl-name{font-size:14px}
  .bl-why{display:block;font-size:12.5px}
}
</style>
</head>

<script>
// ── DATA ────────────────────────────────────────────────────────
const RECIPES_RAW = [
{"name":"Sambal udang petai","mealType":"Mains","cuisine":"Malay","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Tumis bahan kisar sambal, garlic, onion - add asam, belacan, and water once pecah. Salt and sugar accordingly. Udang first and petai last. Goreng udang pre-masak if keeping it for longer. Optional is serai, onion rings to add last"},
{"name":"Ayam masak merah","mealType":"Mains","cuisine":"Malay","protein":"Chicken","time":"45–90 minutes","difficulty":"Medium","instructions":"Marinate chicken with kunyit and salt, shallow fry or bake and set aside. With leftover oil tumis sambal, garlic, onion until pecah then add water and serai. Add sugar, salt, asam. Optional add evaporated milk, gula melaka, daun limau purut, tomatoes. Garnish with onion rings and cilantro."},
{"name":"Tenggiri belado","mealType":"Mains","cuisine":"Malay","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Fry fish w kunyit salt and set aside. Kisar cili merah, cili padi, bawang merah and putih, belacan, and kunyit hidup if ada. Tumis and add sugar, fish sauce, oyster sauce, and little asam. Can add vegetables in mix (petai, french bean) and add back fish if desired"},
{"name":"Nasi tomato","mealType":"Mains","cuisine":"Malay","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Medium","instructions":"Tumis onion, garlic, halia with some butter. Add daun pandan, serai, rempah 4 sekawan, tomato puree or paste. Add washed rice and toast a minute. Add water and evaporated milk. Add little sugar and salt, raisins to be fancy. Cook rice as usual"},
{"name":"Ikan bakar","mealType":"Mains","cuisine":"Malay","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Ikan bakar buh kunyit garam butter balut aluminum foil bakar lah api perlahan"},
{"name":"Udang/ayam lemak cili padi","mealType":"Mains","cuisine":"Malay","protein":"Chicken","time":"< 45 minutes","difficulty":"Medium","instructions":"Kisar garlic, onion, cili padi, red cili. Fry bahan kisar in oil, add serai until pecah. Add water, santan, asam, sugar, salt, kunyit, optional belacan. Chicken in earlier, udang towards the end. Add tomatoes, potatoes, cilantro to liking"},
{"name":"Kari ayam","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"< 45 minutes","difficulty":"Medium","instructions":"Tumis garlic onion halia, rempah 4 sekawan, and daun kari. Once fragrant add serbuk kari & chili powder paste, tumis until pecah minyak. Add chicken and potatoes until half cooked, then add santan & salt. Garnish with cilantro."},
{"name":"Ayam masak kicap","mealType":"Mains","cuisine":"Malay","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Goreng ayam and set aside. Tumis onion, garlic, halia, lemongrass, cili padi (blend all if can), add daun kari if ada. Add oyster sauce and kicap and re-add ayam"},
{"name":"Ayam bali","mealType":"Mains","cuisine":"Malay","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Kunyit fry chicken and set aside. Kisar onion garlic ginger, saute with serai, cili padi and daun kari. Once fragrant add cilibo and pecah minyak. Add oyster sauce, kicap manis and some asam. Re-add chicken"},
{"name":"Thai basil chicken (phad krapao)","mealType":"Mains","cuisine":"Thai","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute garlic, onion, chili until fragrant. Add minced chicken. Add fish sauce, lightsoy, some darksoy, oyster sauce, sugar, salt and pepper. Add basil last, wilts fast"},
{"name":"Steamed fish","mealType":"Mains","cuisine":"Thai","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Steam any fish for 12 minutes. Once cooked, drain fish juice and pour sauce mix of cili padi, garlic, coriander, fish sauce, lime, sugar, chicken powder, water."},
{"name":"Steamed squid","mealType":"Mains","cuisine":"Thai","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Add lime, coriander, garlic, cili padi, fish sauce, sugar, chicken powder, water. Steam squid 3-5 minutes, drain and pour sauce"},
{"name":"Butter chicky","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate chicken with flour dry batter, then into egg wet batter and fry. For sauce add butter, garlic, curry leaves in a pan and optional onion. Cili after a minute until fragrant. Evaporated milk after and mix with sugar, salt, chicky seasoning"},
{"name":"Lemongrass chicken","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate chicken thigh with oyster sauce, fish sauce, soy sauce, black pepper, honey, lemongrass, sesame oil, garlic, sugar. Bake or fry"},
{"name":"Beef and leek","mealType":"Mains","cuisine":"Malay","protein":"Beef","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate beef with kunyit, salt, pepper. Throw garlic and ginger, add beef and finish with leek, bit of soysauce"},
{"name":"Greenbeans and minced beef rice","mealType":"Mains","cuisine":"Chinese","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Fry minced meat, add lightsoy, darksoy, blackpepper, salt. Add aromatics (garlic, chili, ginger) before greenbeans, then add oyster sauce, sugar, and cornstarch"},
{"name":"Pepper lunch","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Place sliced onions in middle, rice ontop with butter, beef surrounding it. Add corn, spring onions, seasoning. Add soysauce, oyster sauce, honey, black pepper, pour and mix"},
{"name":"Cumin lamb chops","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Mix cumin powder, chili powder, garlic powder, salt, msg. Rub on lamb and fry. Optional add cumin seed"},
{"name":"Chinese Kung pao chicken","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate chicken with soysauce, currypowder, black pepper, cornstarch. Deepfry. Prepare sauce: curry powder, darksoy, lightsoy, oystersauce, sugar, blackpepper, sesame oil. Stirfry aromatics (ginger, garlic, onion, curry leaves, chili, dried shrimp). Add chicken and sauce"},
{"name":"Melayu kungpao chicken","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Pat dry chicken, marinate with salt and white pepper before frying. Fry cashew nuts and dry chili separately. Add ginger, onion petals, oyster sauce, lightsoy, dark soy, rice vinegar, and sugar to chicken. Close pot to steam. Add spring onion, nuts, dry chili back and mix"},
{"name":"Saba fish","mealType":"Mains","cuisine":"Japanese","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Put on pan with very little seasoned salt, oil and some conservative soysauce. Optional serve with lemon, furikake on rice, parsley"},
{"name":"One pot chicken rice","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Wash rice in pot, toast with ginger, onion, garlic. Once fragrant add spring onion, salt, sesame oil and chicken. Heat on low, cover 45 minutes, add slightly more water than usual"},
{"name":"Hainanese Chicken Rice","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"45–90 minutes","difficulty":"Hard","instructions":"(1) Salt chicken, stuff with garlic, scallion, ginger, simmer 40 min. Ice bath. (2) Toast chicken fat, garlic, onion in rice. Add stock. (3) Ginger-scallion oil: pour hot oil. (4) Soysauce: water, sugar, soy. (5) Chili: chili, sugar, broth and vinegar. Baste chicken, serve with scallion oil and cucumber"},
{"name":"Mapo tofu","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Brown meat then add garlic, ginger, gochujang. Add half chicken cube, sugar, salt, black pepper, dark soy. Add tofu and cornstarch slurry"},
{"name":"Beef broccoli","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Marinate beef, stir fry with broccoli, oyster sauce, garlic, soy, sesame oil, cornstarch slurry"},
{"name":"Beef ginger rice","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"45–90 minutes","difficulty":"Easy","instructions":"Saute onion, garlic, ginger. Marinate beef with baking soda. Add sauces and water. Make space for slurry, add egg, stir. Finish with white pepper and spring onions"},
{"name":"Butter prawn w egg floss","mealType":"Mains","cuisine":"Other","protein":"Prawn / Squid","time":"45–90 minutes","difficulty":"Medium","instructions":"Marinate prawns with white pepper and corn flour and deep fry. Use yolks only for floss, sieve. Mix garlic, chili padi, curry leaves, salt, sugar. Heat oil and butter, pour yolk from height while stirring. Add curry leaf mix. Sieve and serve onto prawns"},
{"name":"5-spice chicken stir fry","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate 500g chicken with lightsoy, 5-spice, vinegar, honey, salt. Fry with ginger and garlic. Add vegetables. Add slurry. Garnish with sesame seeds"},
{"name":"Kam heong lala","mealType":"Mains","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Soak clams, make seasoning sauce (oyster, taucu, curry powder, sugar). Tumis aromatics, add clams, cover until open"},
{"name":"Sambal sweet and sour fish","mealType":"Mains","cuisine":"Malay","protein":"Fish","time":"< 45 minutes","difficulty":"Medium","instructions":"Fry potatoes (optional). Fry fish. Pecah sambal with onions and garlic. Add cili and tomato sauce with water. Toss fish. Garnish with coriander"},
{"name":"Sweet and sour chicken","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate chicken with salt, pepper, cornflour, eggs and fry. Combine sauces (sos cili, sos tomato, vinegar, sugar, soy, water). Saute vegetables, add chicken and sauce. Garnish with spring onion and sesame"},
{"name":"Cashew chicken","mealType":"Mains","cuisine":"Chinese","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Prepare sauce (oyster, lightsoy, darksoy, fish sauce, sugar). Saute chicken, add garlic and dried chili. Once cooked, add vegetables and sauce. Roast cashews to be added last"},
{"name":"Chicken 65","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Mix spice bag with chicken breast and yoghurt. Fry with daun kari. Garnish with lemon"},
{"name":"Chicken katsu curry","mealType":"Mains","cuisine":"Japanese","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Saute vegetables, add stock, simmer. Add katsu paste. Batter chicken, coat and fry. Garnish with parsley"},
{"name":"Bulgogi bibimbap","mealType":"Mains","cuisine":"Korean","protein":"Beef","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate beef with soy, garlic, spring onion, sesame oil. Prepare vegetables. Garnish with sesame seeds"},
{"name":"Kimchijiggae","mealType":"Mains","cuisine":"Korean","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute garlic and onion, add beef, then kimchi. Add water, gochujang, chicken stock. Top with enoki and tofu"},
{"name":"KFry Chicken","mealType":"Mains","cuisine":"Korean","protein":"Chicken","time":"< 45 minutes","difficulty":"Easy","instructions":"Mix ginger, garlic, salt, red pepper. Fry twice. Sauce: gochujang, honey, soy, vinegar, sesame oil, sugar, ketchup, garlic. Add wings, garnish with sesame seeds"},
{"name":"Beef stew","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"90+ minutes","difficulty":"Easy","instructions":"Brown beef and fat. Add vegetables, water, seasoning, stock, herbs. Simmer 2 hours. Thicken with cornstarch if needed"},
{"name":"Chicken soup","mealType":"Mains","cuisine":"Other","protein":"Chicken","time":"45–90 minutes","difficulty":"Easy","instructions":"Brown chicken, add aromatics, water, simmer. Shred chicken, add rice or potatoes. Garnish with herbs"},
{"name":"Gochujang pasta","mealType":"Mains","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute garlic and onion, add gochujang and honey. Add cream. Add pasta, some pasta water. Optional stock"},
{"name":"Seafood paella","mealType":"Mains","cuisine":"Other","protein":"Prawn / Squid","time":"45–90 minutes","difficulty":"Easy","instructions":"Saute aromatics, add rice, then stock and seafood. Simmer until rice cooks. Garnish with coriander and lemon"},
{"name":"Beef ragu","mealType":"Mains","cuisine":"Italian","protein":"Beef","time":"90+ minutes","difficulty":"Easy","instructions":"Brown beef, add mirepoix, grape juice, tomato paste and water. Simmer 1-3 hours. Finish with parmesan"},
{"name":"Meatball bolognese","mealType":"Mains","cuisine":"Italian","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Mix meatballs, fry. Saute aromatics, add tomato. Mix with pasta"},
{"name":"Mussels in white sauce","mealType":"Mains","cuisine":"Other","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Soak and clean mussels. Saute aromatics, deglaze with grape juice. Add butter and mussels. Cover, garnish with parsley"},
{"name":"Pesto","mealType":"Mains","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Grind basil, nuts, garlic, parmesan, slowly add oil. Season"},
{"name":"Shrimp scampi/gambas","mealType":"Mains","cuisine":"Other","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute garlic, chili, bayleaf, coriander. Add shrimp and butter. Garnish with parsley and lemon"},
{"name":"Tomato soup","mealType":"Mains","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Roast vegetables, blend with stock and seasoning. Optional basil"},
{"name":"Shakshouka","mealType":"Mains","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute aromatics, add vegetables and water, season, make craters for eggs. Garnish with toppings"},
{"name":"Tuna pasta","mealType":"Mains","cuisine":"Italian","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute aromatics, add tuna, season, add pasta. Garnish"},
{"name":"Simple tomato pasta","mealType":"Mains","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute tomato, garlic, basil, add pasta, water, parmesan"},
{"name":"Shrimp tacos with mango salsa","mealType":"Mains","cuisine":"Other","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Make salsa, saute shrimp, assemble tacos"},
{"name":"Garlic butter steak bites","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"45–90 minutes","difficulty":"Easy","instructions":"Marinate steak, sear, add garlic, butter, seasoning. Garnish"},
{"name":"Mushroom risotto","mealType":"Mains","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Saute mushrooms, add aromatics, rice, grape juice, then stock. Finish with butter and parmesan"},
{"name":"Steak diane","mealType":"Mains","cuisine":"Other","protein":"Beef","time":"< 45 minutes","difficulty":"Easy","instructions":"Cook steak, then mushrooms, aromatics, tomato paste, deglaze with stock, add mustard, Worcestershire, cream"},
{"name":"Fish taco","mealType":"Mains","cuisine":"Other","protein":"Fish","time":"< 45 minutes","difficulty":"Easy","instructions":"Fry fish fingers. Make slaw. Add guacamole. Assemble tacos"},
{"name":"Terung belado","mealType":"Sayur","cuisine":"Malay","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Fry chopped terung lightly coated. Remove and fry anchovies until crispy. Rough chop 3 cili merah, 2 cili padi, 1 bawang besar, 4 garlic cloves and belacan. Tumis until fragrant, add bawang layang, salt, sugar, mix in fried items."},
{"name":"Acar timun","mealType":"Sayur","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Score timun with a fork, cut with onions and nenas. Add vinegar, sugar, salt. Timun and nenas will sweat. Optional: add strips of cili merah for colour"},
{"name":"Longbeans and eggs","mealType":"Sayur","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Fry aromatics, crack an egg and mix. Add longbeans after"},
{"name":"Eggplant/okra sambal","mealType":"Sayur","cuisine":"Malay","protein":"Prawn / Squid","time":"< 45 minutes","difficulty":"Easy","instructions":"Soak dried shrimp in water, chop finely. Cook sambal with garlic, onion, dried shrimp. Add air asam, season with sugar, salt. Add vegetables with some water and cover"},
{"name":"Bayam","mealType":"Sayur","cuisine":"Malay","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Tumis garlic and onion in a little oil. Add oyster sauce and salt. Pour water to steam and cover"},
{"name":"Caprese salad","mealType":"Sayur","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Line basil, top with mozzarella and tomato, drizzle olive oil and balsamic. Season with salt sprinkles"},
{"name":"Honey butter egg tofu","mealType":"Sayur","cuisine":"Chinese","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Coat tofu in cornstarch and fry, set aside. Melt butter and saute garlic. Add soy, sugar, seasoning, and honey. Add tofu back"},
{"name":"Caesar salad","mealType":"Sayur","cuisine":"Italian","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Make croutons by baking bread with olive oil, oregano, and parmesan. Mix anchovy, garlic, egg yolk, Worcestershire, salt, lemon, dijon mustard, and olive oil. Mix with romaine and top with cheese"},
{"name":"Kubis masak lemak","mealType":"Sayur","cuisine":"Malay","protein":"Prawn / Squid","time":"45–90 minutes","difficulty":"Easy","instructions":"Saute udang kering, garlic, and onion. Add kubis, santan, water, and simmer. Season lightly"},
{"name":"Coleslaw","mealType":"Sayur","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Chop cabbage, julienne carrots, add cilantro, lime, salt, pepper, greek yoghurt, and mayo"},
{"name":"Mashed potatoes","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Cut potatoes and boil until soft. Mash with salt, milk, butter"},
{"name":"Duxelles","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Butter in pan, add diced mushroom, shallots, thyme, salt, pepper. Stir frequently, add more butter to finish"},
{"name":"Kerang rebus","mealType":"Sides","cuisine":"Malay","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Soak kerang in salt water. Boil water with serai, add kerang for 2 mins, then immediately submerge in ice bath"},
{"name":"Steamed egg","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Use equal parts egg and water. Whisk, add salt, cover with cling film and steam. Drizzle sesame oil to finish"},
{"name":"Hardboiled but soft yolk egg","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Add egg to boiling water, turn off heat immediately. Remove after 5 mins into ice bath"},
{"name":"Onion rings","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Coat onion rings in a batter of cornflour, flour, paprika, white pepper, garlic powder, baking soda, and water/soda."},
{"name":"Garlic confit","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"90+ minutes","difficulty":"Easy","instructions":"Drench garlic in olive oil, add thyme/rosemary if available. Bake at 130C for 1-2 hours"},
{"name":"Pickled vegetable mix","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Boil vinegar, water, sugar, and salt. Pour into jar and add peppercorns, chili flakes, jalapeno, or bayleaves"},
{"name":"Citrus rice","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Cook rice with 1-2 bayleaves, use less water. Once done, mix with lime/lemon, salt, and cilantro"},
{"name":"Hummus","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"90+ minutes","difficulty":"Easy","instructions":"Soak chickpeas overnight. Boil with baking soda for 1 h, peel skins. Blend with tahini, garlic, salt, lemon juice, olive oil, and ice water. Garnish with paprika and olive oil."},
{"name":"Chickpea cucumber salad","mealType":"Sides","cuisine":"Other","protein":"Vegetarian","time":"< 45 minutes","difficulty":"Easy","instructions":"Mix chickpeas, tomato, cucumber, onion, lime, salt, and cilantro"},

// ── CONSTANTS ───────────────────────────────────────────────────
const MEAL_ORDER = ['Mains','Sayur','Sides','Breakfast','Sauces','Snacks & Dessert'];
const CUISINE_ORDER = ['Malay','Chinese','Italian','Thai','Korean','Japanese','Other'];
const C_COLOR = {Malay:'#C97A45',Chinese:'#C85A5A',Italian:'#3DA070',Thai:'#8B6EC4',Korean:'#C49830',Japanese:'#5B8DD9',Other:'#6B5E4E'};
const C_BG = {Malay:'#FAF0E6',Chinese:'#FCEAEA',Italian:'#E6F6EE',Thai:'#F2EEFF',Korean:'#FDF6E0',Japanese:'#EEF4FF',Other:'#F6F0E8'};
const INGR_KW = ['garlic','onion','ginger','chicken','beef','prawn','fish','tofu','basil','soy sauce','oyster sauce','chili','lime','lemon','butter','cream','coconut milk','rice','pasta','cornstarch','egg','tomato','sugar','salt','pepper','coriander','sesame oil','vinegar','spring onion'];

// ── PROCESS ─────────────────────────────────────────────────────
function processRecipes() {
  return RECIPES_RAW.filter(r => r.instructions && r.instructions.length > 3).map((r,i) => {
    const t = r.instructions.toLowerCase();
    const flav = {
      spicy: (t.includes('chili')||t.includes('cili')||t.includes('sambal')||t.includes('gochujang')) ? 60+Math.floor(Math.random()*30) : Math.floor(Math.random()*35),
      umami: (t.includes('oyster')||t.includes('soy')||t.includes('fish sauce')||t.includes('belacan')) ? 55+Math.floor(Math.random()*35) : Math.floor(Math.random()*45),
      sweet: (t.includes('honey')||t.includes('sugar')||t.includes('sweet')) ? 45+Math.floor(Math.random()*35) : Math.floor(Math.random()*40),
      creamy: (t.includes('santan')||t.includes('cream')||t.includes('butter')||t.includes('milk')) ? 50+Math.floor(Math.random()*35) : Math.floor(Math.random()*35),
    };
    const steps = r.instructions.split(/\.\s+/).map(s=>s.trim()).filter(s=>s.length>8).map(s=>s.endsWith('.')?s:s+'.');
    const ingredients = INGR_KW.filter(k => t.includes(k)).slice(0,8);
    return {...r, id:'r'+i, steps: steps.length ? steps : [r.instructions], flavor:flav, ingredients};
  });
}

const RECIPES = processRecipes();

// ── STATE ───────────────────────────────────────────────────────
let state = {
  page: 'home',
  recipe: null,
  history: JSON.parse(localStorage.getItem('ma_hist')||'[]'),

  shopChecked: {},
  shopList: null,

// ── HELPERS ─────────────────────────────────────────────────────
function timeTag(t) { return t==='< 45 minutes'?'fast':t==='45–90 minutes'?'med':'slow'; }
function diffTag(d) { return d==='Easy'?'easy':d==='Medium'?'medium':'hard'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tShort(t) { return t==='< 45 minutes'?'<45m':t==='45–90 minutes'?'45-90m':'90m+'; }
function saveHistory() { localStorage.setItem('ma_hist', JSON.stringify(state.history)); }
function markCooked(id) {
  const r = RECIPES.find(x=>x.id===id); if(!r) return;
  state.history = [{id,name:r.name,date:new Date().toLocaleDateString('en-MY')}, ...state.history.filter(x=>x.id!==id)].slice(0,50);
  saveHistory(); render();
}

// ── COOK MODE ───────────────────────────────────────────────────
let timerInterval = null;
function openCook(recipe) {
  state.cookRecipe = recipe; state.cookStep = 0; state.cookPhase = 'prep';
  state.cookChecked = {}; state.cookTimer = null; state.cookTimerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('cook-overlay').classList.add('open');
  renderCook();
}
function closeCook() {
  clearInterval(timerInterval);
  document.getElementById('cook-overlay').classList.remove('open');
}
function detectTimer(txt) {
  const m = txt.match(/(\d+)\s*(min|minute|hour|hr|second)/i);
  if (!m) return null;
  const n = parseInt(m[1]), u = m[2].toLowerCase();
  return u.startsWith('h') ? n*3600 : u.startsWith('s') ? n : n*60;
}
function fmtTime(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function renderCook() {
  const r = state.cookRecipe; if (!r) return;
  const wrap = document.getElementById('cook-wrap');
  const prog = document.getElementById('cook-prog');
  const ct = document.getElementById('cook-ct');
  document.getElementById('cook-name').textContent = r.name;
  if (state.cookPhase === 'prep') {
    prog.style.width = '0%'; ct.textContent = 'Prep';
    const ing = r.ingredients.length ? r.ingredients : ['All ingredients'];
    wrap.innerHTML = `
      <div class="cook-step-lbl">Mise en Place</div>
      <div class="cook-step-txt">Get everything ready before you start.</div>
      <div class="cook-checklist">
        ${ing.map((item,i)=>`<div class="ck-item" onclick="toggleCookCheck(${i})"><div class="ck-box${state.cookChecked[i]?' checked':''}">${state.cookChecked[i]?'✓':''}</div><div class="ck-text${state.cookChecked[i]?' checked':''}" style="text-transform:capitalize">${esc(item)}</div></div>`).join('')}
      </div>
      <div class="cook-nav">
        <button class="cook-btn cook-next" onclick="startCook()">Start Cooking →</button>
      </div>`;
  } else {
    const steps = r.steps; const idx = state.cookStep;
    const pct = ((idx+1)/steps.length*100);
    prog.style.width = pct+'%'; ct.textContent = (idx+1)+'/'+steps.length;
    const step = steps[idx];
    const timerSecs = detectTimer(step);
    let timerHTML = '';
    if (timerSecs) {
      const display = state.cookTimer !== null ? fmtTime(state.cookTimer) : fmtTime(timerSecs);
      const lbl = state.cookTimerRunning ? 'Tap to pause' : (state.cookTimer===null?'Tap to start':'Paused — tap to resume');
      timerHTML = `<div class="cook-timer" onclick="toggleTimer(${timerSecs})"><div><div class="cook-timer-display">${display}</div><div class="cook-timer-lbl">${lbl}</div></div><div style="font-size:24px">${state.cookTimerRunning?'⏸':'▶'}</div></div>`;
    }
    wrap.innerHTML = `
      <div class="cook-step-lbl">Step ${idx+1} of ${steps.length}</div>
      <div class="cook-step-txt">${esc(step)}</div>
      ${timerHTML}
      <div class="cook-nav">
        ${idx>0?`<button class="cook-btn cook-prev" onclick="prevStep()">← Back</button>`:''}
        ${idx<steps.length-1
          ? `<button class="cook-btn cook-next" onclick="nextStep()">Next →</button>`
          : `<button class="cook-btn cook-next" style="background:#3DA070" onclick="closeCook()">🎉 Done!</button>`}
      </div>`;
  }
}
function toggleCookCheck(i) { state.cookChecked[i] = !state.cookChecked[i]; renderCook(); }
function startCook() { state.cookPhase='cook'; state.cookStep=0; state.cookTimer=null; state.cookTimerRunning=false; clearInterval(timerInterval); renderCook(); }
function nextStep() { clearInterval(timerInterval); state.cookTimer=null; state.cookTimerRunning=false; state.cookStep++; renderCook(); }
function prevStep() { clearInterval(timerInterval); state.cookTimer=null; state.cookTimerRunning=false; state.cookStep=Math.max(0,state.cookStep-1); renderCook(); }
function toggleTimer(secs) {
  if (state.cookTimer === null) state.cookTimer = secs;
  if (state.cookTimerRunning) { clearInterval(timerInterval); state.cookTimerRunning = false; }
  else {
    state.cookTimerRunning = true;
    timerInterval = setInterval(()=>{
      if (state.cookTimer > 0) { state.cookTimer--; renderCook(); }
      else { clearInterval(timerInterval); state.cookTimerRunning=false; renderCook(); }
    },1000);
  }
  renderCook();
}

// ── GROUPED BROWSE HTML ─────────────────────────────────────────
function groupedBrowseHTML(recipes) {
  let html = '';
  for (const meal of MEAL_ORDER) {
    const mealRecipes = recipes.filter(r=>r.mealType===meal);
    if (!mealRecipes.length) continue;
    const isOpen = state.openMeals[meal];
    const cuisineGroups = CUISINE_ORDER.map(c=>({c, recs:mealRecipes.filter(r=>r.cuisine===c)})).filter(g=>g.recs.length);
    html += `<div class="meal-block">
      <button class="meal-hdr" onclick="toggleMeal('${meal}')">
        <div class="meal-hdr-left">
          <span class="meal-name">${esc(meal)}</span>
          <span class="meal-count">${mealRecipes.length}</span>
        </div>
        <span class="meal-arrow${isOpen?' open':''}">▾</span>
      </button>`;
    if (isOpen) {
      html += '<div class="browse-2col">';
      for (const {c, recs} of cuisineGroups) {
        const col = C_COLOR[c]||'#6B5E4E', bg = C_BG[c]||'#F6F0E8';
        html += `<div class="cuisine-block">
          <div class="cuisine-hdr" style="background:${bg}">
            <div class="cuisine-dot" style="background:${col}"></div>
            <span class="cuisine-name" style="color:${col}">${esc(c)}</span>
            <span class="cuisine-count">· ${recs.length}</span>
          </div>`;
        for (const r of recs) {
          html += `<div class="recipe-row" onclick="viewRecipe('${r.id}')">
            <div class="rr-name">${esc(r.name)}</div>
            <div class="rr-tags">
              <span class="tag tag-${timeTag(r.time)}">${tShort(r.time)}</span>
              <span class="tag tag-${diffTag(r.difficulty)}">${r.difficulty}</span>
            </div>
          </div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

function toggleMeal(m) { state.openMeals[m] = !state.openMeals[m]; render(); }

function renderSearchDrop(val) {

  const q = val.toLowerCase();
  const results = RECIPES.filter(r=>r.name.toLowerCase().includes(q)||r.cuisine.toLowerCase().includes(q)||r.protein.toLowerCase().includes(q)||r.instructions.toLowerCase().includes(q)).slice(0,10);
  if (!results.length) { drop.innerHTML=`<div class="drop-empty">No results for "<strong>${esc(val)}</strong>"</div>`; drop.style.display='block'; return; }
  drop.innerHTML = results.map(r=>`<div class="drop-item" onclick="viewRecipeFromSearch('${r.id}')">

}

function toggleDecideP(p){const s=state.decide||{proteins:[],moods:[],time:'any',cuisine:'any'};s.proteins=s.proteins.includes(p)?s.proteins.filter(x=>x!==p):[...s.proteins,p];state.decide=s;state.decideResults=null;renderPage()}

function runDecide(){
  const s=state.decide||{proteins:[],moods:[],time:'any',cuisine:'any'};
  const scored = RECIPES.filter(r=>r.mealType==='Mains').map(r=>{
    let sc=10; let reason='';
    if(s.proteins.length&&s.proteins.includes(r.protein)){sc+=35;reason=`Has ${r.protein}`;}
    if(s.time!=='any'&&r.time===s.time){sc+=25;if(!reason)reason=`Cooks in ${r.time}`;}
    else if(s.time!=='any'&&s.time==='< 45 minutes'&&r.time==='< 45 minutes')sc+=15;
    if(s.cuisine!=='any'&&r.cuisine===s.cuisine)sc+=20;
    if(s.moods.includes('Comfort')&&(r.cuisine==='Malay'||r.cuisine==='Chinese'))sc+=10;
    if(s.moods.includes('Spicy')&&r.flavor.spicy>55)sc+=10;
    if(s.moods.includes('Light')&&r.time==='< 45 minutes')sc+=8;
    if(s.moods.includes('Quick')&&r.difficulty==='Easy')sc+=8;
    return {...r,score:Math.min(sc,99),reason};
  }).sort((a,b)=>b.score-a.score).slice(0,3);
  state.decideResults=scored; renderPage();
}

function renderIngredients() {
  const ings = state.ings||[];
  let resHTML='';
  if(state.ingResults){
    const {perfect,near}=state.ingResults;
    if(perfect.length) resHTML+=`<div style="margin-bottom:20px"><div style="font-weight:800;font-size:15px;color:var(--tx);margin-bottom:10px">✅ Perfect Matches</div>${perfect.map(r=>`<div class="match-card" onclick="viewRecipe('${r.id}')"><div class="mc-info"><div class="mc-name">${esc(r.name)}</div><div class="card-tags" style="margin-top:4px"><span class="tag tag-cuisine">${esc(r.cuisine)}</span><span class="tag tag-${timeTag(r.time)}">${tShort(r.time)}</span></div></div><div class="mc-pct">✓</div></div>`).join('')}</div>`;
    if(near.length) resHTML+=`<div><div style="font-weight:800;font-size:15px;color:var(--tx);margin-bottom:10px">🟡 Near Matches</div>${near.map(r=>`<div class="match-card" onclick="viewRecipe('${r.id}')"><div class="mc-info"><div class="mc-name">${esc(r.name)}</div><div class="card-tags" style="margin-top:4px"><span class="tag tag-cuisine">${esc(r.cuisine)}</span><span class="tag tag-${timeTag(r.time)}">${tShort(r.time)}</span></div>${r.missing.length?`<div class="mc-missing">Missing: ${r.missing.slice(0,3).map(esc).join(', ')}</div>`:''}</div><div class="mc-pct">${r.cnt}</div></div>`).join('')}</div>`;
    if(!perfect.length&&!near.length) resHTML='<div class="empty"><div class="empty-icon">🧺</div><div class="empty-title">No strong matches</div><p>Try adding more ingredients</p></div>';
  }
  return `
    <div class="hero">
      <div class="hero-lbl">Ingredient Finder</div>
      <div class="hero-title">Cook what <em>you have</em></div>
      <div class="hero-sub" style="padding-bottom:16px">Enter your fridge contents and find matches.</div>
    </div>
    <div class="body">
      <div class="form-box">
        <div class="ing-wrap">
          <input id="ing-inp" class="ing-inp" type="text" placeholder="e.g. chicken, garlic..." onkeydown="if(event.key==='Enter')addIng()">
          <button class="btn btn-secondary btn-sm" onclick="addIng()">+ Add</button>
        </div>
        ${ings.length?`<div class="ing-chips">${ings.map(i=>`<div class="ing-chip">${esc(i)}<button onclick="removeIng('${esc(i)}')" style="margin-left:4px">×</button></div>`).join('')}</div>`:''}
        <button class="btn btn-primary" onclick="findByIng()" ${!ings.length?'disabled':''}>🔍 Find Recipes</button>
      </div>
      ${resHTML}
    </div>`;
}
function addIng(){const i=document.getElementById('ing-inp');if(!i)return;const v=i.value.trim().toLowerCase();if(v&&!(state.ings||[]).includes(v)){state.ings=[...(state.ings||[]),v];state.ingResults=null;}i.value='';renderPage();}
function removeIng(v){state.ings=(state.ings||[]).filter(x=>x!==v);state.ingResults=null;renderPage();}
function findByIng(){
  const ings=state.ings||[];
  const scored=RECIPES.map(r=>{
    const matched=r.ingredients.filter(k=>ings.some(i=>k.includes(i)||i.includes(k)));
    const missing=r.ingredients.filter(k=>!ings.some(i=>k.includes(i)||i.includes(k)));
    return {...r,cnt:matched.length,missing};
  }).filter(r=>r.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  state.ingResults={perfect:scored.filter(r=>r.missing.length===0).slice(0,5),near:scored.filter(r=>r.missing.length>0&&r.missing.length<=4).slice(0,8)};
  renderPage();
}

function renderPlanner() {
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const plan=state.weekPlan||{};
  const hasAny=Object.keys(plan).length>0;
  const weekHTML=`<div class="week-grid">${days.map(d=>{
    const r=plan[d];
    return `<div class="day-cell"><div class="day-lbl">${d}</div>${r
      ?`<div class="day-filled" onclick="viewRecipe('${r.id}')"><div class="day-recipe-name">${esc(r.name)}</div><div class="day-recipe-meta">${esc(r.cuisine)} · ${tShort(r.time)}</div><button class="day-regen" onclick="event.stopPropagation();regenDay('${d}')">↻ swap</button></div>`
      :`<div class="day-empty" onclick="regenDay('${d}')">+ Add</div>`}
    </div>`;
  }).join('')}</div>`;
  let shopHTML='';
  if(state.shopList){
    const cats=state.shopList; const chk=state.shopChecked||{};
    const icons={Produce:'🥬',Protein:'🥩',Pantry:'🫙',Condiments:'🍶'};
    shopHTML=`<div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);padding:18px;margin-top:16px">
      <div style="font-weight:800;font-size:15px;color:var(--tx);margin-bottom:14px">🛒 Shopping List</div>
      ${Object.entries(cats).filter(([,v])=>v.length).map(([cat,items])=>`
        <div class="shop-cat-title">${icons[cat]||'·'} ${cat}</div>
        ${items.map(item=>{const k=cat+':'+item;const done=chk[k];return`<div class="shop-item" onclick="toggleShop('${k}')"><div class="shop-check${done?' done':''}">${done?'✓':''}</div><span class="shop-name${done?' done':''}">${esc(item)}</span></div>`;}).join('')}
      `).join('')}
    </div>`;
  }
  return `
    <div class="hero">
      <div class="hero-lbl">Meal Planner</div>
      <div class="hero-title">Plan the <em>week</em></div>
      <div class="hero-sub" style="padding-bottom:16px">Auto-balanced by protein and cuisine.</div>
    </div>
    <div class="body">
      <div class="action-row" style="margin-bottom:16px">
        <button class="btn btn-primary" onclick="generatePlan()">✨ Generate Week</button>
        ${hasAny?`<button class="btn btn-secondary" onclick="buildShopList()">🛒 Shopping List</button>`:''}
      </div>
      ${weekHTML}${shopHTML}
    </div>`;
}
function generatePlan(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const mains=RECIPES.filter(r=>r.mealType==='Mains');
  const shuffled=[...mains].sort(()=>Math.random()-.5);
  const plan={};let usedProteins=[],ptr=0;
  days.forEach(d=>{
    let pick=null;
    for(let i=ptr;i<shuffled.length;i++){
      if(!usedProteins.slice(-1).includes(shuffled[i].protein)){pick=shuffled[i];ptr=i+1;usedProteins.push(pick.protein);break;}
    }
    if(!pick)pick=shuffled[ptr%shuffled.length];
    plan[d]=pick;
  });
  state.weekPlan=plan;state.shopList=null;state.shopChecked={};renderPage();
}
function regenDay(d){const mains=RECIPES.filter(r=>r.mealType==='Mains');state.weekPlan[d]=mains[Math.floor(Math.random()*mains.length)];renderPage();}
function buildShopList(){
  const all=Object.values(state.weekPlan||{}).flatMap(r=>r?r.ingredients:[]);
  const g={Produce:[],Protein:[],Pantry:[],Condiments:[]};
  const protK=['chicken','beef','fish','prawn','shrimp','squid','lamb'];
  const condK=['soy sauce','oyster sauce','fish sauce','sesame oil','vinegar','sugar','salt'];
  const prodK=['garlic','onion','ginger','basil','cilantro','lemon','lime','tomato','mushroom','leek','broccoli','potato'];
  all.forEach(i=>{
    if(protK.some(k=>i.includes(k)))g.Protein.push(i);
    else if(condK.some(k=>i.includes(k)))g.Condiments.push(i);
    else if(prodK.some(k=>i.includes(k)))g.Produce.push(i);
    else g.Pantry.push(i);
  });
  Object.keys(g).forEach(k=>g[k]=[...new Set(g[k])]);
  state.shopList=g;renderPage();
}
function toggleShop(k){state.shopChecked=state.shopChecked||{};state.shopChecked[k]=!state.shopChecked[k];renderPage();}

function renderHistory() {

        </div>

}

function goBack() { state.recipe=null; state.page=state.prevPage||'home'; render(); }

function renderOverview(){
  const cuisines={},meals={},proteins={};
  RECIPES.forEach(r=>{cuisines[r.cuisine]=(cuisines[r.cuisine]||0)+1;meals[r.mealType]=(meals[r.mealType]||0)+1;proteins[r.protein]=(proteins[r.protein]||0)+1;});
  const topC=Object.entries(cuisines).sort((a,b)=>b[1]-a[1]);
  const topM=Object.entries(meals).sort((a,b)=>b[1]-a[1]);
  const topP=Object.entries(proteins).sort((a,b)=>b[1]-a[1]);
  const quick=RECIPES.filter(r=>r.time==='< 45 minutes').length;
  function bars(entries,maxV,color){return entries.map(([l,n])=>`<div class="bar-lbl-row"><span>${esc(l)}</span><span style="color:var(--tx3)">${n}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(n/maxV*100).toFixed(0)}%;background:${color}"></div></div>`).join('');}
  return `
    <div class="hero">
      <div class="hero-lbl">Overview</div>
      <div class="hero-title">M&amp;A's <em>Kitchen OS</em></div>
      <div class="hero-sub" style="padding-bottom:16px">Your personal cooking collection.</div>

        <div class="stat-box"><div class="stat-num">${quick}</div><div class="stat-lbl">Under 45m</div></div>
        <div class="stat-box"><div class="stat-num">${topP.length}</div><div class="stat-lbl">Proteins</div></div>
      </div>
      <div class="detail-grid">
        <div>
          <div class="bar-section"><div style="font-weight:800;font-size:14px;margin-bottom:12px">By Cuisine</div>${bars(topC,topC[0][1],'var(--or)')}</div>
          <div class="bar-section"><div style="font-weight:800;font-size:14px;margin-bottom:12px">By Protein</div>${bars(topP,topP[0][1],'var(--bl)')}</div>

function renderBucketList() {
  const tried = JSON.parse(localStorage.getItem('ma_tried')||'[]');
  const filter = state.blFilter||'all';
  const triedSet = new Set(tried);
  const doneCount = tried.length;
  const pct = Math.round((doneCount/TO_TRY.length)*100);

  const filtered = filter==='done' ? TO_TRY.filter(d=>triedSet.has(d.id))
    : filter==='untried' ? TO_TRY.filter(d=>!triedSet.has(d.id))
    : filter!=='all' ? TO_TRY.filter(d=>d.cuisine.toLowerCase().includes(filter.toLowerCase()))
    : TO_TRY;

  const cuisineFilters=[...new Set(TO_TRY.map(d=>d.cuisine))];
  const pills=[
    ['all','All 30'],['untried','To Try'],['done','Done'],
    ...cuisineFilters.map(c=>[c.split('/')[0].toLowerCase(),c.split('/')[0]])
  ];

  const cards = filtered.map((d,i)=>{
    const done = triedSet.has(d.id);
    const num = TO_TRY.indexOf(d)+1;
    // Use Unsplash source API for reliable food images
    const imgUrl = d.photo;
    return `<div class="bl-card${done?' done':''}" >
      <div class="bl-photo-wrap">
        <img class="bl-photo" src="${imgUrl}" alt="${esc(d.name)}" loading="lazy" onerror="this.style.background='var(--cr2)';this.style.height='80px'">
        <div class="bl-num">${num}</div>
        <div class="bl-badge ${done?'bl-done-badge':'bl-try-badge'}">${done?'✓ Tried':'To Try'}</div>
      </div>
      <div class="bl-card-body">
        <div class="bl-name">${esc(d.name)}</div>
        <div class="bl-why">${esc(d.why)}</div>
        <div class="bl-card-tags">
          <span class="tag tag-cuisine">${esc(d.cuisine)}</span>
          <span class="tag tag-${d.difficulty==='Easy'?'easy':d.difficulty==='Medium'?'medium':'hard'}">${d.difficulty}</span>
          ${d.tags.slice(0,2).map(t=>`<span class="tag" style="background:var(--pul);color:var(--pu)">${esc(t)}</span>`).join('')}
        </div>
        <button class="bl-check-btn ${done?'tried':'untried'}" onclick="toggleTried('${d.id}')">
          ${done?'✓ We tried this! Remove':'☐ Mark as Tried'}
        </button>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="hero">
      <div class="hero-lbl">M&A Bucket List</div>
      <div class="hero-title">30 dishes to <em>try together</em></div>
      <div class="hero-sub" style="padding-bottom:16px">Curated picks that complement what you already cook — new cuisines, techniques and flavours.</div>
    </div>
    <div class="body">
      <div class="bl-progress">
        <div class="bl-prog-bar"><div class="bl-prog-fill" style="width:${pct}%"></div></div>
        <div class="bl-prog-text">${doneCount}/${TO_TRY.length} tried</div>
      </div>
      <div class="bl-filter-row">
        ${pills.map(([val,lbl])=>`<button class="pill" style="background:${filter===val?'var(--or)':'var(--cr2)'};color:${filter===val?'#fff':'var(--tx2)'};border-color:${filter===val?'var(--or)':'transparent'}" onclick="setBlFilter('${val}')">${lbl}</button>`).join('')}
      </div>
      ${filtered.length?`<div class="bl-grid">${cards}</div>`:'<div class="empty"><div class="empty-icon">✓</div><div class="empty-title">All done here!</div><p>Switch filter to see other dishes.</p></div>'}
    </div>`;
}
function toggleTried(id){
  const tried=JSON.parse(localStorage.getItem('ma_tried')||'[]');
  const updated=tried.includes(id)?tried.filter(x=>x!==id):[...tried,id];
  localStorage.setItem('ma_tried',JSON.stringify(updated));
  renderPage();
}
function setBlFilter(f){state.blFilter=f;renderPage();}

// ── SIDEBAR ──────────────────────────────────────────────────────
function renderSidebar() {
  const NAV=[
    {sec:'Decide',items:[['home','🌙','Tonight'],['decide','🎯','Decide'],['ingredients','🧅','Ingredients']]},
    {sec:'Explore',items:[['browse','📖','Browse'],['planner','📅','Planner'],['bucketlist','🍜','To Try']]},
    {sec:'Track',items:[['history','📋','History'],['overview','📊','Overview']]},
  ];
  const cur=state.recipe?'detail':state.page;
  return `<div class="logo-wrap"><div class="logo">M&A's Kitchen</div><div class="logo-sub">Personal Recipe OS</div></div>
    <nav>${NAV.map(({sec,items})=>`<div class="nav-sec">${sec}</div>${items.map(([id,icon,lbl])=>`<button class="nav-it${cur===id?' active':''}" onclick="navTo('${id}')"><span class="nav-icon">${icon}</span>${lbl}</button>`).join('')}`).join('')}</nav>`;
}

// ── BOTTOM NAV ───────────────────────────────────────────────────
function renderBottomNav() {
  const TABS=[['home','🌙','Home'],['decide','🎯','Decide'],['bucketlist','🍜','To Try'],['planner','📅','Plan'],['history','📋','History']];
  const cur=state.recipe?'detail':state.page;
  return TABS.map(([id,icon,lbl])=>`<button class="bn-it${cur===id||((cur==='detail'||cur==='overview')&&id==='home'&&!['browse','decide','planner','history'].includes(state.page))?' active':''}" onclick="navTo('${id}')"><div class="bn-icon">${icon}</div><div class="bn-lbl">${lbl}</div></button>`).join('');
}

// ── MAIN RENDER ──────────────────────────────────────────────────
function renderPage() {
  const page=document.getElementById('page-content');
  if (!page) return;
  let html='';
  const p=state.recipe?'detail':state.page;
  if(p==='home') html=renderHome();
  else if(p==='browse') html=renderBrowse();
  else if(p==='decide') html=renderDecide();
  else if(p==='ingredients') html=renderIngredients();
  else if(p==='planner') html=renderPlanner();
  else if(p==='history') html=renderHistory();
  else if(p==='overview') html=renderOverview();
  else if(p==='bucketlist') html=renderBucketList();
  else if(p==='detail') html=renderDetail();
  page.innerHTML=html;
}

function render() {
  document.getElementById('sidebar').innerHTML=renderSidebar();
  document.getElementById('bn-inner').innerHTML=renderBottomNav();
  renderPage();
}

// Close search dropdown when clicking outside
document.addEventListener('click', e=>{
  const drop=document.getElementById('search-drop');
  if(drop&&!drop.contains(e.target)&&e.target.id!=='search-inp') drop.style.display='none';
});

// Init
render();
</script>
